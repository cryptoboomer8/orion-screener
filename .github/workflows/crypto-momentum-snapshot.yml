name: Crypto Momentum Snapshot

on:
  # Scheduled runs moved to Render Cron Jobs (cron/snapshot.py).
  # This workflow is kept as a manual fallback only.
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write       # needed to commit files back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run snapshot session and download outputs
        run: |
          pip install anthropic

          python - <<'EOF'
          import anthropic
          import os
          import time
          import signal

          def _timeout_handler(signum, frame):
              raise TimeoutError("Session stream exceeded 5-minute timeout")

          signal.signal(signal.SIGALRM, _timeout_handler)
          signal.alarm(270)  # 4m30s — leaves 30s for file download + commit

          client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])

          AGENT_ID = os.environ["CRYPTO_AGENT_ID"]
          ENVIRONMENT_ID = os.environ["CRYPTO_ENVIRONMENT_ID"]

          # 1. Create session
          session = client.beta.sessions.create(
              agent=AGENT_ID,
              environment_id=ENVIRONMENT_ID,
              title="Crypto Snapshot (hourly cron)",
              betas=["managed-agents-2026-04-01"],
          )
          print(f"Session started: {session.id}")

          # 2. Send the initial trigger message to start the agent
          client.beta.sessions.events.send(
              session_id=session.id,
              events=[{
                  "type": "user.message",
                  "content": [{"type": "text", "text": "Run the snapshot now."}],
              }],
              betas=["managed-agents-2026-04-01"],
          )

          # 3. Stream until the turn is done
          try:
              for event in client.beta.sessions.events.stream(
                  session_id=session.id,
                  betas=["managed-agents-2026-04-01"],
              ):
                  et = getattr(event, "type", None)
                  if et == "agent.message":
                      print(event)

                  elif et == "session.status_idle":
                      stop_reason = getattr(event, "stop_reason", None)
                      stop_type = getattr(stop_reason, "type", None) if stop_reason else None

                      if stop_type == "end_turn":
                          print("Turn complete.")
                          break
                      elif stop_type == "requires_action":
                          raise RuntimeError("Session is idle waiting for action/tool confirmation")

                  elif et == "session.status_terminated":
                      raise RuntimeError("Session terminated with an unrecoverable error")

          except TimeoutError:
              print("WARNING: session stream timed out after 4m30s — proceeding to file download.")
          finally:
              signal.alarm(0)

          # 4. Brief pause for output file indexing
          time.sleep(3)

          # 5. Download snapshot files written to /mnt/session/outputs/
          os.makedirs("snapshots", exist_ok=True)

          outputs = []
          for attempt in range(4):  # initial try + retries for indexing lag
              outputs = list(client.beta.files.list(
                  scope_id=session.id,
                  betas=["managed-agents-2026-04-01"],
              ))

              # Keep only downloadable files if that attribute exists
              outputs = [f for f in outputs if getattr(f, "downloadable", True)]

              if outputs:
                  break

              print(f"No session files yet; retrying ({attempt + 1}/4)...")
              time.sleep(2)

          downloaded = 0
          for f in outputs:
              if not f.filename.startswith("snapshot_"):
                  continue

              dest = os.path.join("snapshots", f.filename)

              # Optional: skip if already present
              if os.path.exists(dest):
                  print(f"Already exists, skipping: {dest}")
                  continue

              response = client.beta.files.download(
                  f.id,
                  betas=["managed-agents-2026-04-01"],
              )
              with open(dest, "wb") as out:
                  out.write(response.read())

              print(f"Downloaded: {dest}")
              downloaded += 1

          print(f"Total new files downloaded: {downloaded}")
          EOF
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CRYPTO_AGENT_ID: ${{ secrets.CRYPTO_AGENT_ID }}
          CRYPTO_ENVIRONMENT_ID: ${{ secrets.CRYPTO_ENVIRONMENT_ID }}

      - name: Commit snapshots to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          # Only commit if there's something new
          git diff --cached --quiet || git commit -m "chore: add crypto snapshot $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
