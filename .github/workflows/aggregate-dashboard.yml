name: Aggregate Dashboard Data

on:
  push:
    branches: [main]
    paths:
      - 'snapshots/**'
      - 'scripts/aggregate_snapshots.py'
      - '.github/workflows/aggregate-dashboard.yml'
  workflow_dispatch:

jobs:
  aggregate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Aggregate snapshots
        run: python scripts/aggregate_snapshots.py

      - name: Commit dashboard data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/snapshots.json
          git diff --cached --quiet || git commit -m "chore: refresh dashboard aggregate"
          git push
