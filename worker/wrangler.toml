name = "orion-snapshot"
main = "src/index.ts"
compatibility_date = "2025-04-01"

# 5-minute snapshot at :00, :05, :10, :15, ..., :55 UTC
# (aggregator runs incremental now, so 3x more snapshots cost basically nothing CI-side)
[triggers]
crons = ["*/5 * * * *"]

# Vars (non-secret). Secrets are set via:
#   wrangler secret put GITHUB_TOKEN
[vars]
GITHUB_REPO = "cryptoboomer8/orion-screener"
GITHUB_BRANCH = "main"
SCREENER_URL = "https://screener.orionterminal.com/api/screener"

# Capture logs + invocation logs so failed scheduled runs surface a reason
# in the CF dashboard instead of just "Exceeded Resources".
[observability]

[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = false
