name = "orion-snapshot"
main = "src/index.ts"
compatibility_date = "2025-04-01"

# Quarter-hourly snapshot at :00, :15, :30, :45 UTC
[triggers]
crons = ["*/15 * * * *"]

# Vars (non-secret). Secrets are set via:
#   wrangler secret put GITHUB_TOKEN
[vars]
GITHUB_REPO = "cryptoboomer8/orion-screener"
GITHUB_BRANCH = "main"
SCREENER_URL = "https://screener.orionterminal.com/api/screener"

# Optional: capture logs for at least the recent few runs
[observability]
enabled = true
