<!DOCTYPE html>
<html lang="en" class="theme-dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orion Screener — Momentum Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { interpolate-size: allow-keywords; }

    html.theme-dark {
      --bg: #060b12; --surface: #0d1520; --surface-hover: #131d2e;
      --border: rgba(0,255,255,0.08);
      --text: #e8ecf1; --text-secondary: #6b7f99;
      --accent: #00e5ff; --accent-secondary: #e040fb;
      --positive: #00e676; --negative: #ff1744; --warning: #ffab00;
      --glow-cyan: rgba(0,229,255,0.12); --glow-magenta: rgba(224,64,251,0.12);
    }
    html.theme-light {
      --bg: #f0f4f8; --surface: #ffffff; --surface-hover: #e8edf3;
      --border: rgba(0,0,0,0.08);
      --text: #0f172a; --text-secondary: #64748b;
      --accent: #0891b2; --accent-secondary: #9333ea;
      --positive: #059669; --negative: #e11d48; --warning: #d97706;
      --glow-cyan: rgba(8,145,178,0.06); --glow-magenta: rgba(147,51,234,0.06);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      line-height: 1.6; -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
      transition: background 0.3s, color 0.3s; scrollbar-gutter: stable;
      min-height: 100vh;
    }
    h1,h2,h3 { color: var(--text); letter-spacing: -0.03em; line-height: 1.08; text-wrap: balance; }
    h1 { font-weight: 700; font-size: clamp(2rem, 5vw, 3.2rem); }
    h2 { font-weight: 600; font-size: 2rem; }
    body, p, li, span, label { font-weight: 400; }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    .animate { animation: fadeInUp 0.6s ease-out both; }
    .animate.delay-1 { animation-delay: 0.1s; }
    .animate.delay-2 { animation-delay: 0.2s; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }

    .theme-toggle {
      width: 32px; height: 32px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: inherit; font-size: 1rem; line-height: 1;
      transition: background 0.15s, border-color 0.15s;
    }
    .theme-toggle:hover { background: var(--surface-hover); border-color: rgba(0,229,255,0.25); }
    .theme-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .theme-icon { display: inline-block; width: 18px; height: 18px; }

    .container { max-width: 1400px; margin: 0 auto; padding: 32px 24px; }
    .bg-atmosphere { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse at 15% 30%, var(--glow-cyan) 0%, transparent 50%), radial-gradient(ellipse at 85% 70%, var(--glow-magenta) 0%, transparent 50%); }


    /* Sustainable Momentum */
    .momentum-section { margin-bottom: 48px; position: relative; z-index: 1; }
    .momentum-head-row { display: flex; justify-content: space-between; align-items: center; gap: 24px; margin-bottom: 12px; flex-wrap: wrap; }
    .momentum-head-row h2 { margin: 0; color: var(--text); font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; }
    .momentum-meta { font-size: 0.78rem; color: var(--text-secondary); font-family: 'JetBrains Mono', ui-monospace, monospace; white-space: nowrap; text-align: right; }

    .momentum-meta-row { display: flex; align-items: center; gap: 10px; flex-wrap: nowrap; }
    .refresh-ring {
      position: relative; width: 20px; height: 20px;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0; cursor: pointer;
      background: transparent; border: none; padding: 0;
      transition: transform 0.15s ease;
    }
    .refresh-ring:hover { transform: scale(1.2); }
    .refresh-ring:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 50%; }
    .refresh-ring-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--positive);
      opacity: var(--dot-opacity, 1);
      box-shadow: 0 0 6px rgba(0,230,118, calc(var(--dot-opacity, 1) * 0.55));
    }
    .refresh-ring.refreshing { animation: ring-pulse 0.5s ease-out; }
    @keyframes ring-pulse { 0% { transform: scale(1); } 50% { transform: scale(1.35); } 100% { transform: scale(1); } }

    .momentum-controls { display: flex; flex-direction: column; gap: 6px; min-width: 220px; }

    /* Filter card — sits inside the cards grid spanning the full row, with
       its own children laid out side-by-side until they can't fit, then
       wrapping to a vertical stack. */
    .momentum-filter-card {
      grid-column: 1 / -1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      margin: 0;
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px 28px;
      min-width: 0;
    }
    .momentum-filter-card .filter-row {
      display: flex; flex-direction: row; align-items: center; gap: 10px;
      flex: 0 0 auto; min-width: 0;
    }
    .momentum-filter-card .filter-row .filter-label { white-space: nowrap; }
    .momentum-filter-card .filter-row #minVolInput { width: 140px; }
    .momentum-filter-card .filter-row .filter-value { white-space: nowrap; }
    .momentum-filter-card .filter-toggle { flex: 0 0 auto; }
    .momentum-filter-card .filter-label {
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 8px; font-size: 0.72rem; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .momentum-filter-card .filter-value {
      color: var(--accent); font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem; font-weight: 600;
      text-transform: none; letter-spacing: 0;
    }
    .momentum-filter-card .filter-toggle {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      font-size: 0.85rem; color: var(--text); font-weight: 500;
    }
    .momentum-filter-card .filter-toggle input[type="checkbox"] {
      accent-color: var(--accent); width: 16px; height: 16px; margin: 0; cursor: pointer;
    }
    .momentum-filter-card .filter-toggle .filter-value { color: var(--text-secondary); margin-left: 2px; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    .momentum-control-label { font-size: 0.72rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.08em; display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
    .momentum-control-value { color: var(--accent); font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; font-weight: 600; text-transform: none; letter-spacing: 0; }
    #minVolInput { width: 100%; accent-color: var(--accent); }
    .momentum-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; text-transform: none; letter-spacing: 0; font-size: 0.82rem; color: var(--text); font-weight: 500; }
    .momentum-toggle input[type="checkbox"] { accent-color: var(--accent); width: 16px; height: 16px; margin: 0; cursor: pointer; }
    .momentum-toggle .momentum-control-value { color: var(--text-secondary); font-weight: 500; margin-left: 2px; }
    .mcard-vol {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-secondary);
      margin-top: 6px;
      display: flex; flex-wrap: wrap;
      align-items: baseline;
      column-gap: 12px; row-gap: 4px;
    }
    .mcard-vol .vol-item { white-space: nowrap; }
    .mcard-vol .v { color: var(--text); font-weight: 500; }
    .momentum-no-matches { padding: 28px 24px; background: var(--surface); border: 1px dashed var(--border); border-radius: 12px; text-align: center; color: var(--text-secondary); font-size: 0.88rem; }

    .momentum-empty { padding: 40px 24px; background: var(--surface); border: 1px dashed var(--border); border-radius: 12px; text-align: center; color: var(--text-secondary); font-size: 0.9rem; }

    .momentum-cards { display: grid; gap: 14px; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }

    /* Each verdict group: a clickable header that spans the full grid row,
       and a body containing an inner grid of cards. Body is hidden when
       data-collapsed="true" on the header. */
    .mgroup-head {
      grid-column: 1 / -1;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin: 0;
      padding: 6px 4px;
      border: none;
      border-bottom: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      column-gap: 10px;
      row-gap: 4px;
      width: 100%;
      text-align: left;
      font-family: inherit;
      color: inherit;
      border-radius: 4px 4px 0 0;
      transition: background 0.15s;
    }
    .mgroup-head:hover { background: var(--surface-hover); }
    .mgroup-head:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .mgroup-head[data-v="building"] { color: var(--accent);           border-bottom-color: rgba(0,229,255,0.22); }
    .mgroup-head[data-v="breakout"] { color: var(--positive);         border-bottom-color: rgba(0,230,118,0.22); }
    .mgroup-head[data-v="igniting"] { color: var(--accent-secondary); border-bottom-color: rgba(224,64,251,0.22); }
    .mgroup-head[data-v="late"]     { color: var(--warning);          border-bottom-color: rgba(255,171,0,0.22); }
    .mgroup-chevron { width: 12px; height: 12px; transition: transform 0.2s ease; flex-shrink: 0; }
    .mgroup-head[data-collapsed="true"] .mgroup-chevron { transform: rotate(-90deg); }
    .mgroup-chevron { grid-column: 1; grid-row: 1; }
    .mgroup-label   { grid-column: 2; grid-row: 1; min-width: 0; }
    .mgroup-count {
      grid-column: 3; grid-row: 1;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.06em;
      font-variant-numeric: tabular-nums;
      text-transform: none;
    }
    .mgroup-head .mgroup-desc-inline {
      grid-column: 2 / 4; grid-row: 2;
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--text-secondary);
      text-transform: none;
      letter-spacing: 0;
      line-height: 1.35;
      white-space: normal;
      text-align: left;
    }
    .mgroup-body {
      grid-column: 1 / -1;
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    }
    .mgroup-body[hidden] { display: none; }
    .mgroup-empty {
      grid-column: 1 / -1;
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-style: italic;
      padding: 4px 4px 4px 22px;
    }

    .mcard {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      transition: border-color 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
      display: flex;
      flex-direction: column;
    }
    .mcard:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.25); }

    .mcard-top { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: 8px; }
    .mcard-symbol { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.01em; color: var(--text); }
    .mcard-symbol .pair { font-size: 0.72rem; color: var(--text-secondary); font-weight: 500; margin-left: 3px; }
    /* Whole-card link — wraps the <article>, click/middle-click behaves as
       a normal <a href="..." target="orion-chart"> would. */
    .mcard-link {
      display: block;
      color: inherit;
      text-decoration: none;
      border-radius: 12px;
      transition: transform 0.18s ease;
    }
    .mcard-link:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .mcard-link:focus-visible .mcard { box-shadow: 0 0 0 1px var(--accent); }
    .mcard-price { font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; color: var(--text); font-variant-numeric: tabular-nums; }

    /* Sparkline — 4h of recent prices, compact, no axes, colored by verdict */
    .mcard-spark {
      display: block;
      width: 100%;
      height: 36px;
      margin: 0 0 10px;
      overflow: visible;
    }
    .mcard-spark polyline { fill: none; stroke-width: 1.4; stroke-linejoin: round; stroke-linecap: round; }
    .mcard[data-v="building"] .mcard-spark polyline { stroke: var(--accent); }
    .mcard[data-v="breakout"] .mcard-spark polyline { stroke: var(--positive); }
    .mcard[data-v="igniting"] .mcard-spark polyline { stroke: var(--accent-secondary); }
    .mcard[data-v="late"]     .mcard-spark polyline { stroke: var(--warning); }
    .mcard-spark .spark-area { fill-opacity: 0.12; stroke: none; }
    .mcard[data-v="building"] .mcard-spark .spark-area { fill: var(--accent); }
    .mcard[data-v="breakout"] .mcard-spark .spark-area { fill: var(--positive); }
    .mcard[data-v="igniting"] .mcard-spark .spark-area { fill: var(--accent-secondary); }
    .mcard[data-v="late"]     .mcard-spark .spark-area { fill: var(--warning); }
    .mcard-spark .spark-dot { fill: currentColor; }
    .mcard-spark .spark-tick { stroke: var(--text); stroke-width: 1; opacity: 0.75; }

    .mcard-verdict {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }
    /* Verdict badge sits at the very top-right of the card, above the symbol row. */
    .mcard-verdict-top { align-self: flex-end; margin-bottom: 12px; }
    /* Percent changes keep their own right-aligned row under the price. */
    .mcard-pcts-row { display: flex; justify-content: flex-start; margin-top: 10px; margin-bottom: 0; }
    .mcard-pcts { font-family: 'JetBrains Mono', monospace; font-size: 0.76rem; color: var(--text); font-variant-numeric: tabular-nums; display: inline-flex; flex-wrap: wrap; gap: 2px 6px; justify-content: flex-start; }
    .mcard-pcts .sep { color: var(--text-secondary); margin: 0 6px 0 2px; }
    .mcard-pcts .up { color: var(--positive); }
    .mcard-pcts .down { color: var(--negative); }


    .v-building      { background: rgba(0,229,255,0.10);   color: var(--accent);           border: 1px solid rgba(0,229,255,0.30); }
    .v-breakout      { background: rgba(0,230,118,0.10);   color: var(--positive);         border: 1px solid rgba(0,230,118,0.30); }
    .v-igniting      { background: rgba(224,64,251,0.10);  color: var(--accent-secondary); border: 1px solid rgba(224,64,251,0.30); }
    .v-late          { background: rgba(255,171,0,0.10);   color: var(--warning);          border: 1px solid rgba(255,171,0,0.30); }

    .mcard[data-v="building"]  { border-left-color: var(--accent); }
    .mcard[data-v="breakout"]  { border-left-color: var(--positive); }
    .mcard[data-v="igniting"]  { border-left-color: var(--accent-secondary); }
    .mcard[data-v="late"]      { border-left-color: var(--warning); opacity: 0.88; }

    .error-state { text-align: center; padding: 60px 24px; position: relative; z-index: 1; }
    .error-state p { color: var(--negative); font-size: 1.05rem; }
    .error-state code { display: block; margin-top: 12px; color: var(--text-secondary); font-size: 0.85rem; }

    @media (max-width: 768px) {
      .container { padding: 20px 16px; }
    }
    @media (max-width: 480px) {
      .momentum-cards { grid-template-columns: 1fr; }
      .mcard { padding: 14px; }
    }

    /* Chart preview pane — pinned to the bottom of the tracker viewport */
    @keyframes previewSlideUp { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .preview-backdrop {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 9000;
      animation: previewSlideUp 0.22s ease-out;
    }
    .preview-backdrop[hidden] { display: none; }
    .preview-modal {
      width: 100%;
      height: clamp(240px, 42vh, 360px);
      background: var(--surface);
      border-top: 1px solid rgba(0,229,255,0.22);
      border-radius: 0;
      overflow: hidden;
      display: flex; flex-direction: column;
      box-shadow: 0 -10px 30px rgba(0,0,0,0.45);
    }
    .preview-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .preview-title { display: flex; gap: 12px; align-items: baseline; flex-wrap: wrap; min-width: 0; }
    .preview-sym { font-size: 0.9rem; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }
    .preview-fulltv { font-size: 0.76rem; color: var(--accent); text-decoration: none; white-space: nowrap; }
    .preview-fulltv:hover { text-decoration: underline; }
    .preview-close {
      background: transparent; border: none; color: var(--text-secondary);
      font-size: 1.5rem; line-height: 1; cursor: pointer;
      padding: 2px 10px; border-radius: 6px; font-family: inherit;
    }
    .preview-close:hover { color: var(--text); background: var(--surface-hover); }
    .preview-frame {
      flex: 1; width: 100%; border: 0; background: var(--bg);
      display: block;
    }
    body.preview-open { padding-bottom: clamp(248px, 43vh, 368px); }
  </style>
</head>
<body>
  <div class="bg-atmosphere"></div>

  <main role="main">
    <div class="container">

      <section class="momentum-section animate delay-1" aria-labelledby="momentum-head">
        <div class="momentum-head-row">
          <h2 id="momentum-head">MOMO Tracker</h2>
          <div class="momentum-meta-row">
            <button class="refresh-ring" id="refreshRing" type="button" aria-label="Time since last data update. Click to poll now." title="Time since last data update. Click to poll now.">
              <span class="refresh-ring-dot" aria-hidden="true"></span>
            </button>
            <div class="momentum-meta" id="momentumMeta">&mdash;</div>
            <button type="button" class="theme-toggle" onclick="cycleTheme()" aria-label="Toggle theme" title="Toggle theme">
              <span id="themeIcon" class="theme-icon" aria-hidden="true"></span>
            </button>
          </div>
        </div>
        <div class="momentum-empty" id="momentumEmpty" style="display:none;">No momentum data yet &mdash; waiting for the first full-payload snapshot.</div>
        <div class="momentum-cards" id="momentumCards">
          <fieldset class="momentum-filter-card" id="momentumFilterCard">
            <legend class="sr-only">Filters</legend>
            <div class="filter-row">
              <label for="minVolInput" class="filter-label">Min 1m vol</label>
              <input type="range" id="minVolInput" min="0" max="500" step="10" value="80" aria-label="Minimum 1-minute volume in thousands of USD">
              <span class="filter-value"><span id="minVolValue">80</span>k$</span>
            </div>
            <label class="filter-toggle">
              <input type="checkbox" id="excludeMajorsInput" checked aria-label="Exclude majors (mcap above 5 billion USD)">
              <span>Exclude majors <span class="filter-value">&gt; $5B</span></span>
            </label>
          </fieldset>
        </div>
      </section>

      <div id="errorState" class="error-state" style="display:none;"></div>

    </div>
  </main>

  <script>
    // === Theme (shared localStorage key with the trading-hours page) ===
    var savedTheme = localStorage.getItem('viz-theme');
    var currentTheme = savedTheme || 'dark';
    var THEME_ICON_MOON = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    var THEME_ICON_SUN  = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>';
    function applyTheme(t) {
      document.documentElement.className = 'theme-' + t;
      var icon = document.getElementById('themeIcon');
      // Show the icon of the theme you'll switch TO when clicking — clearer
      // than showing the icon of the current theme.
      if (icon) icon.innerHTML = t === 'dark' ? THEME_ICON_SUN : THEME_ICON_MOON;
      localStorage.setItem('viz-theme', t);
      currentTheme = t;
    }
    function cycleTheme() { applyTheme(currentTheme === 'dark' ? 'light' : 'dark'); }
    applyTheme(currentTheme);

    // === Momentum state ===
    var momentumData = null;
    var currentMinVolK = 80;
    var excludeMajors = true;            // default: filter out coins with mcap above MAJOR_MCAP_CUTOFF
    var MAJOR_MCAP_CUTOFF = 5e9;         // 5 billion USD
    var MAX_PER_GROUP = 10;              // cap each verdict bucket
    // Collapse state per verdict — initialized from localStorage on DOMContentLoaded.
    var collapsedGroups = {};

    // Remove all dynamically-rendered children of the cards grid while leaving
    // the static filter card (and its event-listener bindings) in place.
    function clearCards() {
      var wrap = document.getElementById('momentumCards');
      if (!wrap) return;
      var filterEl = document.getElementById('momentumFilterCard');
      Array.from(wrap.children).forEach(function(c) {
        if (c !== filterEl) wrap.removeChild(c);
      });
    }

    function showMomentumEmpty() {
      var e = document.getElementById('momentumEmpty');
      if (e) e.style.display = '';
      clearCards();
    }

    function fmtVolume(v) {
      if (v == null) return '—';
      if (v >= 1e6) return '$' + (v / 1e6).toFixed(1) + 'M';
      if (v >= 1e3) return '$' + (v / 1e3).toFixed(0) + 'k';
      return '$' + Math.round(v);
    }

    function makeSpark(prices) {
      if (!prices || prices.length < 2) return '';
      var w = 280, h = 36;
      var min = Infinity, max = -Infinity;
      for (var i = 0; i < prices.length; i++) {
        if (prices[i] < min) min = prices[i];
        if (prices[i] > max) max = prices[i];
      }
      var span = (max - min) || (Math.abs(max) || 1) * 0.001;
      var n = prices.length;
      var step = n > 1 ? w / (n - 1) : 0;
      var pts = [];
      for (var j = 0; j < n; j++) {
        var x = j * step;
        var y = h - ((prices[j] - min) / span) * (h - 4) - 2;
        pts.push(x.toFixed(1) + ',' + y.toFixed(1));
      }
      var line = pts.join(' ');
      var area = 'M ' + pts[0] + (pts.length > 1 ? ' L ' + pts.slice(1).join(' L ') : '') + ' L ' + w + ',' + h + ' L 0,' + h + ' Z';

      // Hour ticks along the x-axis baseline, working back from "now".
      // 5-min snapshot cadence → every 12 points is ~1 hour.
      var ticks = '';
      for (var k = 12; k < n; k += 12) {
        var idx = n - 1 - k;
        if (idx < 0) break;
        var tx = (idx * step).toFixed(1);
        ticks += '<line class="spark-tick" x1="' + tx + '" y1="' + (h - 4) + '" x2="' + tx + '" y2="' + (h - 0.5) + '" vector-effect="non-scaling-stroke"/>';
      }

      var last = pts[pts.length - 1].split(',');
      return '<svg class="mcard-spark" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none" aria-hidden="true">' +
        '<path class="spark-area" d="' + area + '"/>' +
        '<polyline points="' + line + '"/>' +
        ticks +
        '<circle class="spark-dot" cx="' + last[0] + '" cy="' + last[1] + '" r="2"/>' +
      '</svg>';
    }

    function fmtMcap(v) {
      if (!v) return '—';
      if (v >= 1e12) return '$' + (v / 1e12).toFixed(2) + 'T';
      if (v >= 1e9)  return '$' + (v / 1e9).toFixed(v >= 10e9 ? 1 : 2) + 'B';
      if (v >= 1e6)  return '$' + (v / 1e6).toFixed(0) + 'M';
      return '$' + Math.round(v);
    }

    function classify(r) {
      var c1h = r.c1h || 0, c4h = r.c4h || 0, c12h = r.c12h || 0;
      var zc = r.zc || 0, zv = r.zv || 0, zo = r.zo || 0;
      var zx = r.zx || 0, zp = r.zp || 0;
      var rng = r.rng || 0, fund = r.fund || 0;

      if (zp > 1.2) return { v: 'late', why: '5m move is running way ahead of the 1h trend &mdash; likely a quick pump.' };
      if (zx > 1.2 || fund > 0.03) return { v: 'late', why: 'Funding is elevated &mdash; longs are crowded and paying to hold.' };
      if (rng > 0.95 && c1h < 1) return { v: 'late', why: 'Already at the 24h high with no fresh push &mdash; late to enter.' };

      var cascading = c1h > 0.5 && c4h > c1h * 0.5 && c12h > 0;
      var notCrowded = zx < 0.8 && fund < 0.025;
      var oiNotDumping = zo > -0.3;
      var freshPush = c1h > 1;
      var rangeOk = rng < 0.92 || freshPush;

      if (c1h > 2.5 && zv > 0.4 && c4h > 0 && oiNotDumping) {
        return { v: 'breakout', why: 'Fresh push backed by rising volume &mdash; real participation.' };
      }

      if (cascading && notCrowded && oiNotDumping && rangeOk) {
        var pieces = [];
        if (zo > 0.4) pieces.push('OI climbing strongly');
        else if (zo > 0) pieces.push('OI holding up');
        else pieces.push('OI flat');
        if (fund < 0) pieces.push('funding negative (shorts paying)');
        else if (fund < 0.01) pieces.push('funding calm');
        if (rng > 0.9) pieces.push('making new 24h highs');
        else if (rng < 0.75) pieces.push('room left in the 24h range');
        return { v: 'building', why: pieces.join(', ') + '.' };
      }

      if (c1h > 1 && zc > 0.3 && c4h < c1h * 3) {
        return { v: 'igniting', why: 'Move looks freshly started &mdash; 1h leading, longer frames still catching up.' };
      }

      return { v: 'igniting', why: 'Positive composite score but mixed signals &mdash; watch, don\u2019t chase.' };
    }

    function formatPrice(p) {
      if (p == null) return '';
      if (p >= 100) return p.toFixed(2);
      if (p >= 1) return p.toFixed(3);
      if (p >= 0.01) return p.toFixed(4);
      return p.toFixed(6);
    }

    function pctSpan(v) {
      var cls = v > 0 ? 'up' : v < 0 ? 'down' : '';
      var sign = v > 0 ? '+' : '';
      return '<span class="' + cls + '">' + sign + (v || 0).toFixed(1) + '%</span>';
    }

    function buildMomentum(data) {
      momentumData = data;
      renderMomentum();
    }

    function renderMomentum() {
      var data = momentumData;
      var wrap = document.getElementById('momentumCards');
      var meta = document.getElementById('momentumMeta');
      var empty = document.getElementById('momentumEmpty');
      if (!wrap || !data || !data.leaderboard || data.leaderboard.length === 0) {
        showMomentumEmpty();
        return;
      }
      if (empty) empty.style.display = 'none';
      wrap.style.display = '';

      if (meta) {
        var d = new Date(data.ts);
        var pad2 = function(n) { return n < 10 ? '0' + n : '' + n; };
        meta.innerHTML = pad2(d.getHours()) + ':' + pad2(d.getMinutes()) + ' CEST';
      }

      var minVolUsd = currentMinVolK * 1000;
      var totalCount = data.leaderboard.length;

      var order = { building: 0, breakout: 1, igniting: 2, late: 3 };
      var classified = data.leaderboard
        .filter(function(r) { return (r.v1m || 0) >= minVolUsd; })
        .filter(function(r) { return !excludeMajors || (r.mcap || 0) <= MAJOR_MCAP_CUTOFF; })
        .map(function(r) { return { row: r, klass: classify(r) }; });
      classified.sort(function(a, b) {
        var oa = order[a.klass.v], ob = order[b.klass.v];
        if (oa !== ob) return oa - ob;
        return (b.row.sms || 0) - (a.row.sms || 0);
      });

      function renderCard(item) {
        var r = item.row, k = item.klass;
        var sym = (r.s || '').replace(/USDT$/, '');
        var pair = (r.s || '').endsWith('USDT') ? '<span class="pair">/USDT</span>' : '';
        var tradesFmt = (r.t5m || 0).toLocaleString();
        var volLine = '<div class="mcard-vol">' +
          '<span class="vol-item">Vol/1m (15m avg): <span class="v">' + fmtVolume(r.v1m || 0) + '</span></span>' +
          '<span class="vol-item">Trades/5m: <span class="v">' + tradesFmt + '</span></span>' +
          '<span class="vol-item">MCap: <span class="v">' + fmtMcap(r.mcap) + '</span></span>' +
        '</div>';
        return '<a class="mcard-link" href="./go-chart.html?s=' + encodeURIComponent(r.s) + '" target="orion-chart" title="Click: quick preview. Middle-click / Ctrl-click: open ' + sym + ' in full TradingView tab.">' +
          '<article class="mcard" data-v="' + k.v + '">' +
          '<div class="mcard-top">' +
            '<div class="mcard-symbol">' + sym + pair + '</div>' +
            '<div class="mcard-price">$' + formatPrice(r.price) + '</div>' +
          '</div>' +
          makeSpark(r.p) +
          '<div class="mcard-pcts-row">' +
            '<span class="mcard-pcts">' +
              pctSpan(r.c5m) + '<span class="sep">5m</span>' +
              pctSpan(r.c15m) + '<span class="sep">15m</span>' +
              pctSpan(r.c1h) + '<span class="sep">1h</span>' +
              pctSpan(r.c4h) + '<span class="sep">4h</span>' +
              pctSpan(r.c1d) + '<span class="sep">24h</span>' +
            '</span>' +
          '</div>' +
          volLine +
        '</article>' +
        '</a>';
      }

      var groupLabels = { building: 'Building', breakout: 'Breakout', igniting: 'Igniting', late: 'Late / avoid' };
      var groupDescriptions = {
        building: 'Cascading 1h/4h/12h, OI holding up, funding calm \u2014 the sweet spot for slow-buildup entries.',
        breakout: 'Fresh 1h push (>2.5%) confirmed by rising volume \u2014 real participation, not a wick.',
        igniting: '1h leading, longer frames not caught up yet \u2014 early-stage, needs confirmation.',
        late: 'Pumpy, crowded funding, or pinned at the 24h high \u2014 the move is already priced in.'
      };
      var groupOrder = ['building', 'breakout', 'igniting', 'late'];
      var byGroup = { building: [], breakout: [], igniting: [], late: [] };
      classified.forEach(function(item) {
        var bucket = byGroup[item.klass.v];
        if (bucket.length < MAX_PER_GROUP) bucket.push(item);
      });

      var chevronSvg = '<svg class="mgroup-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>';

      var parts = [];
      groupOrder.forEach(function(v) {
        var group = byGroup[v];
        var isCollapsed = !!collapsedGroups[v];
        var totalInBucket = classified.filter(function(it) { return it.klass.v === v; }).length;
        var countLabel = group.length;
        if (totalInBucket > MAX_PER_GROUP) countLabel = group.length + ' of ' + totalInBucket;
        parts.push(
          '<button type="button" class="mgroup-head" data-v="' + v + '" data-collapsed="' + isCollapsed + '" aria-expanded="' + (!isCollapsed) + '">' +
            chevronSvg +
            '<span class="mgroup-label">' + groupLabels[v] + '</span>' +
            '<span class="mgroup-count">' + countLabel + '</span>' +
            '<span class="mgroup-desc-inline">' + groupDescriptions[v] + '</span>' +
          '</button>'
        );
        parts.push('<div class="mgroup-body" data-v="' + v + '"' + (isCollapsed ? ' hidden' : '') + '>');
        if (group.length) {
          group.forEach(function(item) { parts.push(renderCard(item)); });
        } else {
          parts.push('<div class="mgroup-empty">No coins in this bucket right now.</div>');
        }
        parts.push('</div>');
      });

      clearCards();
      wrap.insertAdjacentHTML('beforeend', parts.join(''));
    }

    document.addEventListener('DOMContentLoaded', function() {
      var savedMinVol = parseInt(localStorage.getItem('orion-min-vol-k') || '', 10);
      if (!isNaN(savedMinVol)) currentMinVolK = savedMinVol;
      var savedExclude = localStorage.getItem('orion-exclude-majors');
      if (savedExclude === '0') excludeMajors = false;
      else if (savedExclude === '1') excludeMajors = true;

      try {
        var savedCollapse = JSON.parse(localStorage.getItem('orion-collapsed-groups') || '{}');
        if (savedCollapse && typeof savedCollapse === 'object') collapsedGroups = savedCollapse;
      } catch (e) { collapsedGroups = {}; }

      // Click any group header to toggle its body. Delegated on the cards container.
      var cardsWrap = document.getElementById('momentumCards');
      if (cardsWrap) {
        cardsWrap.addEventListener('click', function(e) {
          var head = e.target.closest('.mgroup-head');
          if (!head) return;
          var v = head.getAttribute('data-v');
          var isCollapsed = head.getAttribute('data-collapsed') === 'true';
          var nowCollapsed = !isCollapsed;
          collapsedGroups[v] = nowCollapsed;
          localStorage.setItem('orion-collapsed-groups', JSON.stringify(collapsedGroups));
          head.setAttribute('data-collapsed', String(nowCollapsed));
          head.setAttribute('aria-expanded', String(!nowCollapsed));
          var body = cardsWrap.querySelector('.mgroup-body[data-v="' + v + '"]');
          if (body) {
            if (nowCollapsed) body.setAttribute('hidden', '');
            else body.removeAttribute('hidden');
          }
        });
      }

      var minVolInput = document.getElementById('minVolInput');
      var minVolValue = document.getElementById('minVolValue');
      var excludeInput = document.getElementById('excludeMajorsInput');

      if (excludeInput) {
        excludeInput.checked = excludeMajors;
        excludeInput.addEventListener('change', function() {
          excludeMajors = !!excludeInput.checked;
          localStorage.setItem('orion-exclude-majors', excludeMajors ? '1' : '0');
          renderMomentum();
        });
      }

      if (minVolInput) {
        minVolInput.value = currentMinVolK;
        if (minVolValue) minVolValue.textContent = currentMinVolK;
        var mvPending = false;
        minVolInput.addEventListener('input', function() {
          var v = parseInt(minVolInput.value, 10) || 0;
          currentMinVolK = v;
          if (minVolValue) minVolValue.textContent = v;
          localStorage.setItem('orion-min-vol-k', String(v));
          if (mvPending) return;
          mvPending = true;
          requestAnimationFrame(function() { mvPending = false; renderMomentum(); });
        });
      }

      // === Poll-on-change refresh + "freshness" dot ===
      // Every POLL_INTERVAL_MS we fetch momentum.json; if its ts differs from
      // the last one we rendered, re-render and reset the freshness dot to
      // full brightness. The dot fades from 1.0 → MIN_OPACITY over
      // DOT_FADE_MS so you can see at a glance how overdue the next update
      // is. Snaps back to bright green the moment new data lands.
      var POLL_INTERVAL_MS = 30 * 1000;
      var DOT_FADE_MS = POLL_INTERVAL_MS; // dot fades across one poll window
      var MIN_OPACITY = 0.18;
      var ringEl = document.getElementById('refreshRing');
      var lastSeenTs = null;          // ts string of the most recent payload we rendered
      var lastPollAt = Date.now();    // wall-clock of the last time we polled (for the fade)
      var polling = false;

      function poll() {
        if (polling) return;
        polling = true;
        fetch('./data/momentum.json?_=' + Date.now())
          .then(function(r) { return r.ok ? r.json() : null; })
          .then(function(m) {
            if (!m) { showMomentumEmpty(); return; }
            if (m.ts && m.ts !== lastSeenTs) {
              lastSeenTs = m.ts;
              buildMomentum(m);
              // Brief pulse animation whenever fresh data actually lands.
              ringEl.classList.remove('refreshing');
              void ringEl.offsetWidth;   // restart the animation
              ringEl.classList.add('refreshing');
            }
            var el = document.getElementById('errorState');
            if (el) el.style.display = 'none';
          })
          .catch(function(err) {
            var el = document.getElementById('errorState');
            if (el) {
              el.style.display = '';
              el.innerHTML = '<p>Failed to load momentum data</p><code>' + err.message + '</code>';
            }
          })
          .finally(function() {
            polling = false;
            // Reset the fade clock on every successful poll — bright dot
            // means "just checked", fades across the next 30s wait.
            lastPollAt = Date.now();
            tickDot();
          });
      }

      function tickDot() {
        if (polling) return;
        var elapsed = Date.now() - lastPollAt;
        var ratio = Math.max(0, Math.min(1, elapsed / DOT_FADE_MS));
        var opacity = 1 - ratio * (1 - MIN_OPACITY);
        ringEl.style.setProperty('--dot-opacity', opacity.toFixed(2));
      }

      // Click the dot to force a poll right now.
      ringEl.addEventListener('click', poll);

      // Initial load + steady polling loop.
      poll();
      setInterval(poll, POLL_INTERVAL_MS);
      setInterval(tickDot, 1000);

      // Coming back to a hidden tab: poll immediately so we catch any missed updates.
      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'visible') poll();
      });

      // === Chart preview overlay ===
      // Left-click a coin symbol -> quick glance in an embedded TV iframe,
      // overlaid on the tracker pane. Middle-click / Ctrl-click / Cmd-click
      // still follow the <a href> (goes via go-chart.html stub to full TV).
      var previewBackdrop = document.getElementById('previewBackdrop');
      var previewFrame = document.getElementById('previewFrame');
      var previewSymbolEl = document.getElementById('previewSymbol');
      var previewFullTv = document.getElementById('previewFullTv');
      var previewCloseBtn = document.getElementById('previewClose');

      function buildTvEmbedSrc(symbol) {
        // Official TradingView widgetembed URL — free, no key, iframe-friendly.
        // hidesidetoolbar=0 keeps the drawing tools available for a quick measure.
        var params = [
          'symbol=BYBIT%3A' + encodeURIComponent(symbol) + '.P',
          'interval=1',
          'theme=dark',
          'style=1',
          'timezone=Etc%2FUTC',
          'locale=en',
          'toolbarbg=060b12',
          'hide_top_toolbar=1',  // strip the interval/compare/indicator row
          'hide_legend=1',       // hide the OHLC + symbol header bar
          'hidesidetoolbar=1',   // hide the left drawing-tools column
          'hideideas=1',
          'hotlist=0',
          'calendar=0',
          'details=0',
          'studies=%5B%22Volume%40tv-basicstudies%22%5D', // force volume pane even if globally off
          'autosize=1'
        ];
        return 'https://s.tradingview.com/widgetembed/?' + params.join('&');
      }

      function openPreview(symbol) {
        var display = symbol.replace(/USDT$/, '') + ' / USDT';
        previewSymbolEl.textContent = display;
        previewFullTv.href = 'https://www.tradingview.com/chart/?symbol=BYBIT:' + symbol + '.P&interval=1';
        // Only reload the iframe when the symbol actually changed; avoids
        // flicker on repeated clicks of the same coin.
        var newSrc = buildTvEmbedSrc(symbol);
        if (previewFrame.dataset.symbol !== symbol) {
          previewFrame.src = newSrc;
          previewFrame.dataset.symbol = symbol;
        }
        previewBackdrop.hidden = false;
        document.body.classList.add('preview-open');
      }
      function closePreview() {
        previewBackdrop.hidden = true;
        // Unload the iframe so it stops streaming when closed.
        previewFrame.src = 'about:blank';
        previewFrame.dataset.symbol = '';
        document.body.classList.remove('preview-open');
      }

      previewCloseBtn.addEventListener('click', closePreview);
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && !previewBackdrop.hidden) closePreview();
      });

      // Intercept left-clicks on any symbol anchor inside the momentum cards.
      var cardsContainer = document.getElementById('momentumCards');
      if (cardsContainer) {
        cardsContainer.addEventListener('click', function(e) {
          var a = e.target.closest('.mcard-link');
          if (!a) return;
          // Let modified clicks and non-primary buttons fall through to the
          // normal href (so middle-click / ctrl-click opens full TV in a new tab).
          if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.button !== 0) return;
          e.preventDefault();
          // Extract the symbol from the go-chart stub's href (?s=SYMBOL).
          var href = a.getAttribute('href') || '';
          var m = href.match(/[?&]s=([^&]+)/);
          if (!m) return;
          openPreview(decodeURIComponent(m[1]));
        });
      }
    });
  </script>

  <!-- Chart preview pane lives at the body root so position:fixed anchors to
       the viewport, not to any transformed ancestor like .animate sections. -->
  <div class="preview-backdrop" id="previewBackdrop" hidden>
    <div class="preview-modal" role="dialog" aria-modal="true" aria-labelledby="previewSymbol">
      <div class="preview-head">
        <div class="preview-title">
          <span id="previewSymbol" class="preview-sym">&mdash;</span>
          <a id="previewFullTv" href="#" target="_blank" rel="noopener" class="preview-fulltv">Open full TV &rarr;</a>
        </div>
        <button class="preview-close" id="previewClose" aria-label="Close chart preview" type="button">&times;</button>
      </div>
      <iframe id="previewFrame" class="preview-frame" title="TradingView 1-minute chart preview" loading="lazy"></iframe>
    </div>
  </div>
</body>
</html>
